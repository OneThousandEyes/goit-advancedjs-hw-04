<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixabay Image Search</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css" />
    <!-- Custom JavaScript -->
    <script type="module" src="./main.js" defer></script>
  </head>
  <body>
    <div class="container">
      <form class="form">
        <label>
          <input
            type="text"
            name="search-text"
            placeholder="Search images..."
            required
          />
        </label>
        <button type="submit">Search</button>
      </form>
      <ul class="gallery js-gallery" id="gallery"></ul>
      <button class="load-more-btn js-load-more-btn is-hidden" type="button">
        Load more
      </button>
      <span class="loader js-loader"></span>
    </div>
  </body>
</html>
